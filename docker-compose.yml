services:
  auth-db:
    image: postgres:15-alpine
    container_name: auth-db
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASS:-1331}
      POSTGRES_DB: ${DB_NAME:-auth_db}
    ports:
      - "${DB_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-auth_db}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - shared-network

  auth-service:
    build: .
    container_name: auth-service
    depends_on:
      auth-db:
        condition: service_healthy
    environment:
      DB_USER: ${DB_USER:-postgres}
      DB_PASS: ${DB_PASS:-1331}
      DB_NAME: ${DB_NAME:-auth_db}
      DB_HOST: auth-db
      DB_PORT: 5432
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ALGORITHM: ${JWT_ALGORITHM}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS}
      ADMIN_LOGIN: ${ADMIN_LOGIN}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
    command: >
      sh -c "
      if [ -z \"$$(ls -A alembic/versions)\" ]; then
        echo 'No migrations found, generating initial migration...'
        alembic revision --autogenerate -m 'Initial migration'
      fi &&
      alembic upgrade head && 
      python src/infrastructure/db/init_admin.py && 
      python src/infrastructure/main.py"
    networks:
      - shared-network

  test-db:
    image: postgres:15-alpine
    container_name: auth-test-db
    environment:
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test_password
      POSTGRES_DB: auth_test_db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test_user -d auth_test_db"]
      interval: 3s
      timeout: 3s
      retries: 5
    networks:
      - shared-network

  test-runner:
    build: .
    container_name: auth-test-runner
    depends_on:
      test-db:
        condition: service_healthy
    environment:
      DB_USER: test_user
      DB_PASS: test_password
      DB_NAME: auth_test_db
      DB_HOST: test-db
      DB_PORT: 5432
      JWT_SECRET_KEY: "test_secret_key_change_me"
      JWT_ALGORITHM: "HS256"
      PYTHONPATH: .:/app/src
    command: >
      sh -c "pytest tests/ -v"
    networks:
      - shared-network

networks:
  shared-network:
    name: microservices_network
    driver: bridge