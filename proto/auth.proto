syntax = "proto3";

package auth;

import "google/protobuf/empty.proto";

service AuthNavigation {
  rpc Login (LoginRequest) returns (TokenResponse);
  rpc RefreshToken (RefreshRequest) returns (TokenResponse);
  rpc ValidateToken (ValidateRequest) returns (ValidateResponse);
  rpc CreateUser (CreateUserRequest) returns (UserResponse);
  rpc UpdateUser (UpdateUserRequest) returns (UserResponse);
  rpc DeleteUser (DeleteUserRequest) returns (DeleteResponse);
  rpc RevokeAccess (RevokeRequest) returns (DeleteResponse);
  rpc ListUsers (google.protobuf.Empty) returns (UserListResponse);
}

message LoginRequest {
  string login = 1;
  string password = 2;
}

message RefreshRequest {
  string refresh_token = 1;
}

message TokenResponse {
  string access_token = 1;
  string refresh_token = 2;
  string token_type = 3;
}

message ValidateRequest {
  string token = 1;
}

message ValidateResponse {
  int32 user_id = 1;
  string login = 2;
  string role = 3;
  int32 branch = 4;
  bool is_valid = 5;
}

message CreateUserRequest {
  string login = 1;
  string password = 2;
  string role = 3;
  int32 branch = 4;
}

message UpdateUserRequest {
  int32 id = 1;
  optional string password = 2;
  optional string role = 3;
  optional bool is_active = 4;
  optional int32 branch = 5;
}

message DeleteUserRequest {
  int32 id = 1;
}

message RevokeRequest {
  int32 user_id = 1;
}

message DeleteResponse {
  bool result = 1;
}

message UserListResponse {
  repeated UserResponse users = 1;
}

message UserResponse {
  int32 id = 1;
  string login = 2;
  string role = 3;
  bool is_active = 4;
  int32 branch = 5;
}